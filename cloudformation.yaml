AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Puran — Short-Term Financial Goal Tracker
  AWS CloudHacks 2026 @ UCI
  Stack: S3 | Lambda | DynamoDB | API Gateway | Bedrock | QuickSight (manual setup)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-haiku-20240307-v1:0
    Description: Bedrock model used for categorization and recommendations

# ─────────────────────────────────────────────────────────────────────────────
# RESOURCES
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ── S3 ──────────────────────────────────────────────────────────────────────
  # One bucket: raw/ prefix for incoming CSVs, processed/ prefix for QuickSight
  FinancialDataBucket:
    Type: AWS::S3::Bucket
    DependsOn: CsvProcessorInvokePermission
    Properties:
      BucketName: !Sub puran-data-${Environment}-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [PUT, POST, GET]
            AllowedOrigins: ['*']
            MaxAge: 3000
      LifecycleConfiguration:
        Rules:
          - Id: ExpireRawUploads
            Status: Enabled
            Prefix: raw/
            ExpirationInDays: 7
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: raw/
                  - Name: suffix
                    Value: .csv
            Function: !GetAtt CsvProcessorFunction.Arn
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  CsvProcessorInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt CsvProcessorFunction.Arn
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  # ── DynamoDB ─────────────────────────────────────────────────────────────────
  # Tables already created by teammate — referenced by name only

  # ── IAM ──────────────────────────────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub puran-lambda-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: PuranLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # S3: read raw uploads, write processed exports
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GeneratePresignedUrl
                Resource: !Sub arn:aws:s3:::puran-data-${Environment}-${AWS::AccountId}/*
              # S3: list bucket (needed for pre-signed URL generation)
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !Sub arn:aws:s3:::puran-data-${Environment}-${AWS::AccountId}
              # DynamoDB: full CRUD on both tables
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:BatchWriteItem
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FinancialTransactions
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FinancialTransactions/index/*
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/UserGoals
              # Lambda: invoke teammate DynamoDB handler functions
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:FinancialTransactions-handler
                  - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:UserGoals-handler
              # Bedrock: invoke Claude 3 Haiku
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-haiku-20240307-v1:0
              # QuickSight: generate embedded dashboard URLs
              - Effect: Allow
                Action:
                  - quicksight:GenerateEmbedUrlForAnonymousUser
                  - quicksight:GenerateEmbedUrlForRegisteredUser
                  - quicksight:GetDashboardEmbedUrl
                Resource: '*'

  # ── Lambda Functions ──────────────────────────────────────────────────────────

  # Triggered by S3 upload: parses CSV, calls Bedrock for specs, writes to DynamoDB,
  # then exports enriched data back to S3 processed/ for QuickSight SPICE ingestion.
  CsvProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub puran-csv-processor-${Environment}
      Runtime: python3.12
      Handler: csv_processor.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          TRANSACTIONS_LAMBDA: FinancialTransactions-handler
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          DATA_BUCKET: !Sub puran-data-${Environment}-${AWS::AccountId}
          ENVIRONMENT: !Ref Environment
          USER_ID: demo-user
      Code:
        ZipFile: |
          # Placeholder — deploy via: aws lambda update-function-code --zip-file fileb://deployment.zip
          def handler(event, context):
              return {'statusCode': 200, 'body': 'placeholder'}

  # FastAPI app wrapped with Mangum. Handles all REST routes.
  FastApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub puran-api-${Environment}
      Runtime: python3.12
      Handler: main.handler   # main.py exports handler = Mangum(app)
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          TRANSACTIONS_LAMBDA: FinancialTransactions-handler
          GOALS_LAMBDA: UserGoals-handler
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          DATA_BUCKET: !Sub puran-data-${Environment}-${AWS::AccountId}
          QUICKSIGHT_ACCOUNT_ID: !Ref AWS::AccountId
          QUICKSIGHT_NAMESPACE: default
          ENVIRONMENT: !Ref Environment
          USER_ID: demo-user
      Code:
        ZipFile: |
          # Placeholder — deploy via: aws lambda update-function-code --zip-file fileb://deployment.zip
          def handler(event, context):
              return {'statusCode': 200, 'body': '{"message":"placeholder"}'}

  # ── API Gateway ───────────────────────────────────────────────────────────────
  PuranApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub puran-api-${Environment}
      Description: Puran Financial Goal Tracker REST API
      EndpointConfiguration:
        Types: [REGIONAL]

  # Catch-all proxy resource: forwards every path+method to FastAPI Lambda
  ProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PuranApi
      ParentId: !GetAtt PuranApi.RootResourceId
      PathPart: '{proxy+}'

  ProxyMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PuranApi
      ResourceId: !Ref ProxyResource
      HttpMethod: ANY
      AuthorizationType: NONE   # no auth for demo
      RequestParameters:
        method.request.path.proxy: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FastApiFunction.Arn}/invocations
        CacheKeyParameters:
          - method.request.path.proxy

  # Also handle requests to the root path
  RootMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PuranApi
      ResourceId: !GetAtt PuranApi.RootResourceId
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FastApiFunction.Arn}/invocations

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ProxyMethod
      - RootMethod
    Properties:
      RestApiId: !Ref PuranApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref PuranApi
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref Environment
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          ThrottlingBurstLimit: 100
          ThrottlingRateLimit: 50

  FastApiInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt FastApiFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PuranApi}/*/*

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────────────────────────────────────────
Outputs:
  ApiEndpoint:
    Description: API Gateway base URL — set as VITE_API_URL in Amplify env vars
    Value: !Sub https://${PuranApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub puran-api-endpoint-${Environment}

  DataBucketName:
    Description: S3 bucket for CSV uploads and QuickSight exports
    Value: !Sub puran-data-${Environment}-${AWS::AccountId}
    Export:
      Name: !Sub puran-data-bucket-${Environment}

  TransactionsTableName:
    Description: DynamoDB transactions table
    Value: FinancialTransactions

  GoalsTableName:
    Description: DynamoDB goals table
    Value: UserGoals

  CsvProcessorFunctionArn:
    Description: CSV processor Lambda ARN
    Value: !GetAtt CsvProcessorFunction.Arn

  FastApiFunctionArn:
    Description: FastAPI Lambda ARN
    Value: !GetAtt FastApiFunction.Arn
