AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Puran — Short-Term Financial Goal Tracker
  AWS CloudHacks 2026 @ UCI
  Architecture: API Gateway → per-endpoint Lambdas → DynamoDB (existing tables) + Bedrock + S3
  Frontend hosted on Amplify (configured separately via console).

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-haiku-20240307-v1:0

# ─────────────────────────────────────────────────────────────────────────────
# RESOURCES
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ── S3 ──────────────────────────────────────────────────────────────────────
  FinancialDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub puran-data-${Environment}-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [PUT, POST, GET]
            AllowedOrigins: ['*']
            MaxAge: 3000
      LifecycleConfiguration:
        Rules:
          - Id: ExpireRawUploads
            Status: Enabled
            Prefix: raw/
            ExpirationInDays: 7
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # ── DynamoDB ─────────────────────────────────────────────────────────────────
  # Tables (FinancialTransactions, UserGoals, Suggestions) managed by teammate

  # ── IAM ──────────────────────────────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub puran-lambda-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: PuranLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GeneratePresignedUrl
                Resource: !Sub arn:aws:s3:::puran-data-${Environment}-${AWS::AccountId}/*
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !Sub arn:aws:s3:::puran-data-${Environment}-${AWS::AccountId}
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:BatchWriteItem
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FinancialTransactions
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/FinancialTransactions/index/*
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/UserGoals
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/Suggestions
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-haiku-20240307-v1:0
              - Effect: Allow
                Action:
                  - quicksight:GenerateEmbedUrlForAnonymousUser
                  - quicksight:GenerateEmbedUrlForRegisteredUser
                Resource: '*'

  # ─────────────────────────────────────────────────────────────────────────────
  # LAMBDA FUNCTIONS
  # Each Lambda is placeholder — deploy real code via `aws lambda update-function-code`
  # ─────────────────────────────────────────────────────────────────────────────

  UploadFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub puran-upload-${Environment}
      Runtime: python3.12
      Handler: upload.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          TRANSACTIONS_TABLE: FinancialTransactions
          DATA_BUCKET: !Sub puran-data-${Environment}-${AWS::AccountId}
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          USER_ID: demo-user
      Code:
        ZipFile: |
          def handler(event, context):
              return {"statusCode": 200, "body": "placeholder:upload"}

  UploadGoalFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub puran-upload-goal-${Environment}
      Runtime: python3.12
      Handler: upload_goal.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          GOALS_TABLE: UserGoals
          USER_ID: demo-user
      Code:
        ZipFile: |
          def handler(event, context):
              return {"statusCode": 200, "body": "placeholder:upload-goal"}

  CategorizeGoalFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub puran-categorize-goal-${Environment}
      Runtime: python3.12
      Handler: categorize_goal.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          GOALS_TABLE: UserGoals
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          USER_ID: demo-user
      Code:
        ZipFile: |
          def handler(event, context):
              return {"statusCode": 200, "body": "placeholder:categorize-goal"}

  GetGoalsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub puran-get-goals-${Environment}
      Runtime: python3.12
      Handler: get_goals.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          GOALS_TABLE: UserGoals
          USER_ID: demo-user
      Code:
        ZipFile: |
          def handler(event, context):
              return {"statusCode": 200, "body": "placeholder:get-goals"}

  GetUserDataFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub puran-get-user-data-${Environment}
      Runtime: python3.12
      Handler: get_user_data.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          TRANSACTIONS_TABLE: FinancialTransactions
          USER_ID: demo-user
      Code:
        ZipFile: |
          def handler(event, context):
              return {"statusCode": 200, "body": "placeholder:get-user-data"}

  GetSuggestionsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub puran-get-suggestions-${Environment}
      Runtime: python3.12
      Handler: get_suggestions.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          SUGGESTIONS_TABLE: Suggestions
          USER_ID: demo-user
      Code:
        ZipFile: |
          def handler(event, context):
              return {"statusCode": 200, "body": "placeholder:get-suggestions"}

  PostSuggestionFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub puran-post-suggestion-${Environment}
      Runtime: python3.12
      Handler: post_suggestion.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          SUGGESTIONS_TABLE: Suggestions
          USER_ID: demo-user
      Code:
        ZipFile: |
          def handler(event, context):
              return {"statusCode": 200, "body": "placeholder:post-suggestion"}

  GenerateSuggestionsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub puran-generate-suggestions-${Environment}
      Runtime: python3.12
      Handler: generate_suggestions.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          TRANSACTIONS_TABLE: FinancialTransactions
          GOALS_TABLE: UserGoals
          SUGGESTIONS_TABLE: Suggestions
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          USER_ID: demo-user
      Code:
        ZipFile: |
          def handler(event, context):
              return {"statusCode": 200, "body": "placeholder:generate-suggestions"}

  # ─────────────────────────────────────────────────────────────────────────────
  # API GATEWAY
  # One REST API. Each path routes to its dedicated Lambda via AWS_PROXY.
  # ─────────────────────────────────────────────────────────────────────────────

  PuranApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub puran-api-${Environment}
      EndpointConfiguration:
        Types: [REGIONAL]

  # /upload ────────────────────────────────────────────────────────────────────
  UploadResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PuranApi
      ParentId: !GetAtt PuranApi.RootResourceId
      PathPart: upload

  UploadMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PuranApi
      ResourceId: !Ref UploadResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${UploadFunction.Arn}/invocations

  UploadInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt UploadFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PuranApi}/*/POST/upload

  # /goals ─────────────────────────────────────────────────────────────────────
  GoalsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PuranApi
      ParentId: !GetAtt PuranApi.RootResourceId
      PathPart: goals

  GoalsGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PuranApi
      ResourceId: !Ref GoalsResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetGoalsFunction.Arn}/invocations

  GoalsPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PuranApi
      ResourceId: !Ref GoalsResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${UploadGoalFunction.Arn}/invocations

  GetGoalsInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt GetGoalsFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PuranApi}/*/GET/goals

  UploadGoalInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt UploadGoalFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PuranApi}/*/POST/goals

  # /goals/categorize ──────────────────────────────────────────────────────────
  GoalsCategorizeResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PuranApi
      ParentId: !Ref GoalsResource
      PathPart: categorize

  GoalsCategorizeMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PuranApi
      ResourceId: !Ref GoalsCategorizeResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CategorizeGoalFunction.Arn}/invocations

  CategorizeGoalInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt CategorizeGoalFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PuranApi}/*/POST/goals/categorize

  # /user-data ─────────────────────────────────────────────────────────────────
  UserDataResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PuranApi
      ParentId: !GetAtt PuranApi.RootResourceId
      PathPart: user-data

  UserDataMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PuranApi
      ResourceId: !Ref UserDataResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetUserDataFunction.Arn}/invocations

  GetUserDataInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt GetUserDataFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PuranApi}/*/GET/user-data

  # /suggestions ───────────────────────────────────────────────────────────────
  SuggestionsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PuranApi
      ParentId: !GetAtt PuranApi.RootResourceId
      PathPart: suggestions

  SuggestionsGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PuranApi
      ResourceId: !Ref SuggestionsResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetSuggestionsFunction.Arn}/invocations

  SuggestionsPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PuranApi
      ResourceId: !Ref SuggestionsResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PostSuggestionFunction.Arn}/invocations

  GetSuggestionsInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt GetSuggestionsFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PuranApi}/*/GET/suggestions

  PostSuggestionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt PostSuggestionFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PuranApi}/*/POST/suggestions

  # /suggestions/generate ──────────────────────────────────────────────────────
  SuggestionsGenerateResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PuranApi
      ParentId: !Ref SuggestionsResource
      PathPart: generate

  SuggestionsGenerateMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PuranApi
      ResourceId: !Ref SuggestionsGenerateResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GenerateSuggestionsFunction.Arn}/invocations

  GenerateSuggestionsInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt GenerateSuggestionsFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PuranApi}/*/GET/suggestions/generate

  # ── Deployment + stage ───────────────────────────────────────────────────────
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - UploadMethod
      - GoalsGetMethod
      - GoalsPostMethod
      - GoalsCategorizeMethod
      - UserDataMethod
      - SuggestionsGetMethod
      - SuggestionsPostMethod
      - SuggestionsGenerateMethod
    Properties:
      RestApiId: !Ref PuranApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref PuranApi
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref Environment
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          ThrottlingBurstLimit: 100
          ThrottlingRateLimit: 50

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────────────────────────────────────────
Outputs:
  ApiEndpoint:
    Description: API Gateway base URL — set as VITE_API_URL in Amplify env vars
    Value: !Sub https://${PuranApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub puran-api-endpoint-${Environment}

  DataBucketName:
    Value: !Sub puran-data-${Environment}-${AWS::AccountId}

  LambdaFunctions:
    Description: All deployed Lambda function names
    Value: !Sub |
      upload=${UploadFunction},
      upload-goal=${UploadGoalFunction},
      categorize-goal=${CategorizeGoalFunction},
      get-goals=${GetGoalsFunction},
      get-user-data=${GetUserDataFunction},
      get-suggestions=${GetSuggestionsFunction},
      post-suggestion=${PostSuggestionFunction},
      generate-suggestions=${GenerateSuggestionsFunction}
